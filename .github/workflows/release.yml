name: release

# Builds, signs (GPG), and publishes provider archives on a vX.Y.Z tag, in the
# layout the Terraform Registry expects. One-time setup: add GPG_PRIVATE_KEY and
# PASSPHRASE repo secrets, and register the provider + its public GPG key on
# registry.terraform.io. Cut a release with:
#   git tag vX.Y.Z && git push origin vX.Y.Z
#
# Security note: actions are pinned to full commit SHAs (the GPG private key
# passes through these steps; a mutable tag is a theft path). When bumping,
# resolve the new tag's commit and update both the SHA and the trailing comment.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@e89d40939c28e39f97cf32126055eeae86ba74ec # v6.3.0
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          args: release --clean
        env:
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
