name: ci

# Runs the gates on every PR and on pushes to the default branch. Acceptance
# tests (TF_ACC) are NOT run here — they require real credentials and create
# billable infrastructure; validate those manually against your environment.
#
# Security note: actions are pinned to full commit SHAs (org supply-chain
# rule, matching release.yml). When bumping, resolve the new tag's commit and
# update both the SHA and the trailing comment.

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: "go.mod"
          cache: true

      - name: gofmt
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: v2.12.2

      - name: Build
        run: go build ./...

      - name: Test (unit + SDK coverage)
        run: go test ./... -timeout 120s
